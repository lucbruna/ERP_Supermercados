apiVersion: v1
kind: Secret
metadata:
  name: crm-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crm.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  rabbitmq-password: {{ .Values.secrets.rabbitmqPassword | quote }}
  rabbitmq-erlang-cookie: {{ .Values.secrets.rabbitmqErlangCookie | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  aes-256-key: {{ .Values.secrets.aes256Key | quote }}
  minio-root-password: {{ .Values.secrets.minioRootPassword | quote }}
  grafana-password: {{ .Values.secrets.grafanaPassword | quote }}
  database-url: {{ printf "postgresql://%s:%s@%s:5432/%s"
    .Values.postgresql.auth.username
    .Values.secrets.postgresPassword
    ( .Values.postgresql.fullnameOverride | default "postgres" )
    .Values.postgresql.auth.database | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: crm-secrets
  namespace: {{ .Release.Namespace }}-monitoring
  labels:
    {{- include "crm.labels" . | nindent 4 }}
type: Opaque
stringData:
  grafana-password: {{ .Values.secrets.grafanaPassword | quote }}
