# ============================================================================
# CRM Supermercado - Helm Values
# ============================================================================

global:
  environment: production
  timezone: America/Sao_Paulo
  imageRegistry: ghcr.io/crm-supermercado
  imagePullSecrets: []
  labels: {}
  annotations: {}

# ============================================================================
# Infrastructure Dependencies
# ============================================================================

postgresql:
  enabled: true
  fullnameOverride: postgres
  auth:
    database: crm_supermercado
    username: admin
    password: changeme
  architecture: standalone
  primary:
    persistence:
      size: 50Gi
      storageClass: ""
    resources:
      requests:
        memory: 2Gi
        cpu: "1"
      limits:
        memory: 4Gi
        cpu: "2"
    livenessProbe:
      enabled: true
    readinessProbe:
      enabled: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

redis:
  enabled: true
  fullnameOverride: redis
  auth:
    password: changeme
    enabled: true
  architecture: standalone
  master:
    persistence:
      size: 5Gi
      storageClass: ""
    resources:
      requests:
        memory: 256Mi
        cpu: "250m"
      limits:
        memory: 1Gi
        cpu: "500m"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

rabbitmq:
  enabled: true
  fullnameOverride: rabbitmq
  auth:
    username: admin
    password: changeme
    erlangCookie: changeme-erlang-cookie
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: "250m"
    limits:
      memory: 1Gi
      cpu: "1"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

minio:
  enabled: true
  fullnameOverride: minio
  auth:
    rootUser: admin
    rootPassword: changeme
  persistence:
    size: 50Gi
    storageClass: ""
  resources:
    requests:
      memory: 512Mi
      cpu: "250m"
    limits:
      memory: 1Gi
      cpu: "1"
  defaultBuckets: crm-documents,crm-backups,crm-logos
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# ============================================================================
# Backend Microservices
# ============================================================================

apiGateway:
  enabled: true
  name: api-gateway
  replicaCount: 2
  image: ghcr.io/crm-supermercado/api-gateway:latest
  servicePort: 3000
  containerPort: 3000
  env:
    NODE_ENV: production
    PORT: "3000"
    AUTH_SERVICE_URL: "http://auth-service:3001"
    RH_SERVICE_URL: "http://rh-service:3002"
    FINANCIAL_SERVICE_URL: "http://financial-service:3003"
    PDV_SERVICE_URL: "http://pdv-service:3004"
    INVENTORY_SERVICE_URL: "http://inventory-service:3005"
    CRM_SERVICE_URL: "http://crm-service:3006"
    MARKETING_SERVICE_URL: "http://marketing-service:3007"
    SECURITY_SERVICE_URL: "http://security-service:3008"
    PURCHASING_SERVICE_URL: "http://purchasing-service:3009"
    CFTV_SERVICE_URL: "http://cftv-service:3010"
    DISTRIBUTION_SERVICE_URL: "http://distribution-service:3011"
    BI_SERVICE_URL: "http://bi-service:3012"
    AI_SERVICE_URL: "http://ai-service:3013"
    NOTIFICATION_SERVICE_URL: "http://notification-service:3014"
  ingress:
    enabled: true
    path: /api
  resources:
    requests:
      memory: 512Mi
      cpu: "0.5"
    limits:
      memory: 1Gi
      cpu: "1"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpuUtilization: 70
    memoryUtilization: 80
  pdb:
    enabled: true
    minAvailable: 1
  probe:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 15

