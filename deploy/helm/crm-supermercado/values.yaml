    NEXT_PUBLIC_RH_URL: "http://rh-service:3002/api/v1"
    NEXT_PUBLIC_FINANCIAL_URL: "http://financial-service:3003/api/v1"
    NEXT_PUBLIC_PDV_URL: "http://pdv-service:3004/api/v1"
