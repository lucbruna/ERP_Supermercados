# ============================================================================
# Monitoring
# ============================================================================

monitoring:
  prometheus:
    enabled: true
    fullnameOverride: prometheus
    alertmanager:
      enabled: false
    server:
      persistentVolume:
        size: 50Gi
      resources:
        requests:
          memory: 512Mi
          cpu: "300m"
        limits:
          memory: 2Gi
          cpu: "1"
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true

  grafana:
    enabled: true
    fullnameOverride: grafana
    adminPassword: admin
    persistence:
      size: 10Gi
    resources:
      requests:
        memory: 256Mi
        cpu: "200m"
      limits:
        memory: 1Gi
        cpu: "500m"
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: crm
            orgId: 1
            folder: CRM
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/crm
    dashboards:
      crm:
        api-gateway:
          gnetId: 11159
          revision: 1
          datasource: Prometheus
        postgres:
          gnetId: 9628
          revision: 1
          datasource: Prometheus

# ============================================================================
# Ingress & TLS
# ============================================================================

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - crm.supermercado.com
      secretName: crm-tls
  hosts:
    - host: crm.supermercado.com
      paths:
        - path: /api
          pathType: Prefix
          serviceName: api-gateway
          servicePort: 3000
        - path: /
          pathType: Prefix
          serviceName: web-app
          servicePort: 3080
        - path: /dashboard
          pathType: Prefix
          serviceName: dashboard
          servicePort: 3081

# ============================================================================
# Security
# ============================================================================

secrets:
  postgresPassword: changeme
  redisPassword: changeme
  rabbitmqPassword: changeme
  rabbitmqErlangCookie: changeme-erlang-cookie
  jwtSecret: your-jwt-secret-with-at-least-32-characters
  aes256Key: your-aes-256-key-that-is-exactly-32-bytes
  minioRootPassword: changeme
  grafanaPassword: admin

config:
  jwtExpiration: "3600"
  corsOrigin: "https://crm.supermercado.com,https://dashboard.supermercado.com"
  jaegerHost: "jaeger.crm-monitoring.svc.cluster.local"
  logLevel: info

# ============================================================================
# Global Settings
# ============================================================================

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
