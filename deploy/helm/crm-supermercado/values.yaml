    NEXT_PUBLIC_FISCAL_URL: "http://notification-service:3014/api/v1"
    NEXT_PUBLIC_FROTA_URL: "http://distribution-service:3011/api/v1"
    NEXT_PUBLIC_INTEGRATION_URL: "http://notification-service:3014/api/v1"
    NEXT_PUBLIC_CODIGO_BARRAS_URL: "http://inventory-service:3005/api/v1"
    NEXT_PUBLIC_CONTRATOS_URL: "http://auth-service:3001/api/v1"
    NEXT_PUBLIC_HABILIDADES_URL: "http://rh-service:3002/api/v1"
  ingress:
