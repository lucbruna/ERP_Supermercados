apiVersion: v2
name: crm-supermercado
description: CRM Supermercado - ERP completo para supermercados
type: application
version: 1.0.0
appVersion: "1.0.0"
icon: https://raw.githubusercontent.com/crm-supermercado/brand/main/icon.png
keywords:
  - crm
  - supermercado
  - erp
  - pdv
  - estoque
  - financeiro
home: https://crm-supermercado.com
sources:
  - https://github.com/crm-supermercado/crm-supermercado
maintainers:
  - name: CRM Supermercado Team
    email: dev@crm-supermercado.com
dependencies:
  - name: postgresql
    version: "12.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: rabbitmq
    version: "12.x"
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
  - name: minio
    version: "12.x"
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  - name: prometheus
    version: "25.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: "7.x"
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.grafana.enabled
