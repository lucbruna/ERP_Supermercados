networks:
  crm-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  grafana-data:
  prometheus-data:
  elasticsearch-data:
  kibana-data:
  minio-data:

services:
  # ==================== DATABASE ====================
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crm_supermercado
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecret
      POSTGRES_CONFIG_FILE: /etc/postgresql/postgresql.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/init/02-create-replication-user.sql:/docker-entrypoint-initdb.d/02-create-replication-user.sql
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crm_supermercado"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "wal_keep_size=256"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"

  # ==================== CONNECTION POOL ====================
  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: crm-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    environment:
      PGBOUNCER_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 500
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 300
      PGBOUNCER_QUERY_TIMEOUT: 30
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: admin
      POSTGRESQL_PASSWORD: supersecret
      POSTGRESQL_DATABASE: crm_supermercado
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - crm-network
    depends_on:
      postgres:
        condition: service_healthy

  # ==================== READ REPLICA ====================
  postgres-replica:
    image: postgres:16-alpine
    container_name: crm-postgres-replica
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: crm_supermercado
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecret
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_secret
      PRIMARY_HOST: postgres
    volumes:
      - ./docker/postgres-replica/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    networks:
      - crm-network
    depends_on:
      postgres:
        condition: service_healthy

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: crm-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: crm_supermercado
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecret
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
      BACKUP_KEEP_WEEKS: 8
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups
    networks:
      - crm-network
    depends_on:
      postgres:
        condition: service_healthy

  # ==================== CACHE ====================
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redis-data:/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==================== MESSAGE QUEUE ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: crm-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: .
      dockerfile: packages/backend/api-gateway/Dockerfile
    container_name: crm-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      RH_SERVICE_URL: http://rh-service:3002
      FINANCIAL_SERVICE_URL: http://financial-service:3003
      PDV_SERVICE_URL: http://pdv-service:3004
      INVENTORY_SERVICE_URL: http://inventory-service:3005
      CRM_SERVICE_URL: http://crm-service:3006
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      JAEGER_HOST: jaeger
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - crm-network

  # ==================== BACKEND SERVICES ====================
  auth-service:
    build:
      context: .
      dockerfile: packages/backend/auth-service/Dockerfile
    container_name: crm-auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/auth_service
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/auth
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      JAEGER_HOST: jaeger
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - crm-network

  rh-service:
    build:
      context: .
      dockerfile: packages/backend/rh-service/Dockerfile
    container_name: crm-rh-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/rh_service
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/rh
      REDIS_HOST: redis
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      JAEGER_HOST: jaeger
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  financial-service:
    build:
      context: .
      dockerfile: packages/backend/financial-service/Dockerfile
    container_name: crm-financial-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/financial_service
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/financial
      REDIS_HOST: redis
      JAEGER_HOST: jaeger
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  pdv-service:
    build:
      context: .
      dockerfile: packages/backend/pdv-service/Dockerfile
    container_name: crm-pdv-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/pdv_service
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/pdv
      REDIS_HOST: redis
      JAEGER_HOST: jaeger
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  inventory-service:
    build:
      context: .
      dockerfile: packages/backend/inventory-service/Dockerfile
    container_name: crm-inventory-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/inventory_service
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/inventory
      REDIS_HOST: redis
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  crm-service:
    build:
      context: .
      dockerfile: packages/backend/crm-service/Dockerfile
    container_name: crm-crm-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/crm_service
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/crm
      REDIS_HOST: redis
      JAEGER_HOST: jaeger
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  monitoring-service:
    build:
      context: .
      dockerfile: packages/backend/monitoring-service/Dockerfile
    container_name: crm-monitoring-service
    restart: unless-stopped
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: production
      PORT: 3009
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      JAEGER_HOST: jaeger
    networks:
      - crm-network

  base-brasil-service:
    build:
      context: .
      dockerfile: packages/backend/base-brasil/Dockerfile
    container_name: crm-base-brasil
    restart: unless-stopped
    ports:
      - "3015:3015"
    environment:
      NODE_ENV: production
      PORT: 3015
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/base_brasil
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/base_brasil
      REDIS_HOST: redis
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  codigo-barras-service:
    build:
      context: .
      dockerfile: packages/backend/codigo-barras-service/Dockerfile
    container_name: crm-codigo-barras
    restart: unless-stopped
    ports:
      - "3016:3016"
    environment:
      NODE_ENV: production
      PORT: 3016
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/codigo_barras
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/codigo_barras
      REDIS_HOST: redis
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  contratos-service:
    build:
      context: .
      dockerfile: packages/backend/contratos-service/Dockerfile
    container_name: crm-contratos
    restart: unless-stopped
    ports:
      - "3017:3017"
    environment:
      NODE_ENV: production
      PORT: 3017
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/contratos
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/contratos
      REDIS_HOST: redis
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  convenio-service:
    build:
      context: .
      dockerfile: packages/backend/convenio-service/Dockerfile
    container_name: crm-convenio
    restart: unless-stopped
    ports:
      - "3018:3018"
    environment:
      NODE_ENV: production
      PORT: 3018
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/convenio
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/convenio
      REDIS_HOST: redis
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  frota-service:
    build:
      context: .
      dockerfile: packages/backend/frota-service/Dockerfile
    container_name: crm-frota
    restart: unless-stopped
    ports:
      - "3019:3019"
    environment:
      NODE_ENV: production
      PORT: 3019
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/frota
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/frota
      REDIS_HOST: redis
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  habilidades-service:
    build:
      context: .
      dockerfile: packages/backend/habilidades-service/Dockerfile
    container_name: crm-habilidades
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      NODE_ENV: production
      PORT: 3020
      DATABASE_URL: postgresql://admin:supersecret@pgbouncer:6432/habilidades
      DATABASE_URL_REPLICA: postgresql://admin:supersecret@postgres-replica:5433/habilidades
      REDIS_HOST: redis
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - crm-network

  # ==================== MONITORING ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: crm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - crm-network

  grafana:
    image: grafana/grafana:latest
    container_name: crm-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - crm-network
    depends_on:
      - prometheus

  # ==================== LOGGING / ELK STACK ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: crm-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=crm-logs
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/init.sh:/usr/share/elasticsearch/init.sh
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"' || curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: crm-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=crm-supermercado-encryption-key-32chars!
    volumes:
      - kibana-data:/usr/share/kibana/data
      - ./docker/kibana/init.sh:/usr/share/kibana/init.sh
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - crm-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: crm-logstash
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "9600:9600"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.monitoring.enabled=false
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logs:/var/log/crm:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - crm-network
    profiles:
      - logging

  # ==================== DISTRIBUTED TRACING ====================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: crm-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4318:4318"
      - "4317:4317"
      - "14268:14268"
      - "6831:6831/udp"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - crm-network

  # ==================== FRONTEND ====================
  web-app:
    build:
      context: .
      dockerfile: packages/frontend/web-app/Dockerfile
    container_name: crm-web-app
    restart: unless-stopped
    ports:
      - "3080"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    networks:
      - crm-network

  dashboard:
    build:
      context: .
      dockerfile: packages/frontend/dashboard/Dockerfile
    container_name: crm-dashboard
    restart: unless-stopped
    ports:
      - "3081"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    networks:
      - crm-network

  # ==================== MINIO S3 STORAGE ====================
  minio:
    image: minio/minio:latest
    container_name: crm-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - crm-network

  minio-init:
    image: minio/mc
    container_name: crm-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb local/crm-documents;
        mc mb local/crm-images;
        mc mb local/crm-backups;
        mc policy set public local/crm-images;
        echo 'Buckets created successfully';
      "
    networks:
      - crm-network

  # ==================== NGINX REVERSE PROXY ====================
  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - web-app
      - dashboard
      - realtime-service
      - minio
    networks:
      - crm-network
