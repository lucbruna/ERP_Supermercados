name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  detect-changes:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: set-matrix
        shell: pwsh
        run: |
          $changed = git diff --name-only HEAD~1 HEAD | Select-String '^packages/backend/([^/]+)/' | ForEach-Object { $_.Matches[0].Groups[1].Value } | Select-Object -Unique
          if ($changed.Count -eq 0) { $changed = @() }
          $json = $changed | ForEach-Object { @{service = $_} } | ConvertTo-Json -Compress
          "matrix=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build-and-push:
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: packages/backend/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push]
    if: ${{ always() && needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
        shell: bash
      - name: Trigger Kubernetes rollout
        shell: pwsh
        run: |
          $services = "${{ needs.build-and-push.outputs.changed-services }}".Split(',')
          foreach ($svc in $services) {
            if ($svc.Trim() -eq 'api-gateway') {
              kubectl rollout restart deployment/api-gateway -n crm-supermercado
            } else {
              kubectl rollout restart deployment/$($svc.Trim() -replace '-service', '')-service -n crm-supermercado
            }
          }
      - name: Verify rollout status
        shell: pwsh
        run: |
          $services = "${{ needs.build-and-push.outputs.changed-services }}".Split(',')
          foreach ($svc in $services) {
            if ($svc.Trim() -eq 'api-gateway') {
              kubectl rollout status deployment/api-gateway -n crm-supermercado --timeout=300s
            } else {
              kubectl rollout status deployment/$($svc.Trim() -replace '-service', '')-service -n crm-supermercado --timeout=300s
            }
          }
