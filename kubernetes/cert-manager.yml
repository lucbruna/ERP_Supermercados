apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@crm-supermercado.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: crm-tls
spec:
  secretName: crm-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: crm.supermercado.com
  dnsNames:
  - crm.supermercado.com
  - api.crm.supermercado.com
