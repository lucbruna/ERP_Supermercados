---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: crm-supermercado
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: crm/web-app:latest
          ports:
            - containerPort: 3080
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.supermercado.com.br/api/v1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: crm-supermercado
spec:
  selector:
    app: web-app
  ports:
    - port: 3080
      targetPort: 3080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: crm-supermercado
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: crm/dashboard:latest
          ports:
            - containerPort: 3081
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.supermercado.com.br/api/v1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: crm-supermercado
spec:
  selector:
    app: dashboard
  ports:
    - port: 3081
      targetPort: 3081
