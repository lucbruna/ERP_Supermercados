apiVersion: apps/v1
kind: Deployment
metadata:
  name: distribution-service
  namespace: crm-supermercado
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distribution-service
  template:
    metadata:
      labels:
        app: distribution-service
    spec:
      containers:
        - name: distribution-service
          image: crm/distribution-service:latest
          ports:
            - containerPort: 3011
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3011"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: crm-secrets
                  key: database-url
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3011
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3011
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: distribution-service
  namespace: crm-supermercado
spec:
  selector:
    app: distribution-service
  ports:
    - port: 3011
      targetPort: 3011
