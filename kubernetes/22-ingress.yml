apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crm-ingress
  namespace: crm-supermercado
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.supermercado.com.br
        - app.supermercado.com.br
        - dashboard.supermercado.com.br
      secretName: crm-tls
  rules:
    - host: api.supermercado.com.br
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path: /api/v1/rh
            pathType: Prefix
            backend:
              service:
                name: rh-service
                port:
                  number: 3002
          - path: /api/v1/financeiro
            pathType: Prefix
            backend:
              service:
                name: financial-service
                port:
                  number: 3003
          - path: /api/v1/pdv
            pathType: Prefix
            backend:
              service:
                name: pdv-service
                port:
                  number: 3004
          - path: /api/v1/estoque
            pathType: Prefix
            backend:
              service:
                name: inventory-service
                port:
                  number: 3005
          - path: /api/v1/crm
            pathType: Prefix
            backend:
              service:
                name: crm-service
                port:
                  number: 3006
          - path: /api/v1/marketing
            pathType: Prefix
            backend:
              service:
                name: marketing-service
                port:
                  number: 3007
          - path: /api/v1/security
            pathType: Prefix
            backend:
              service:
                name: security-service
                port:
                  number: 3008
          - path: /api/v1/compras
            pathType: Prefix
            backend:
              service:
                name: purchasing-service
                port:
                  number: 3009
          - path: /api/v1/cftv
            pathType: Prefix
            backend:
              service:
                name: cftv-service
                port:
                  number: 3010
          - path: /api/v1/cd
            pathType: Prefix
            backend:
              service:
                name: distribution-service
                port:
                  number: 3011
          - path: /api/v1/bi
            pathType: Prefix
            backend:
              service:
                name: bi-service
                port:
                  number: 3012
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 3013
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3014
    - host: app.supermercado.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 3080
    - host: dashboard.supermercado.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3081
