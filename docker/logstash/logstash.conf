input {
  beats {
    port => 5000
    client_inactivity_timeout => 300
  }

  tcp {
    port => 5000
    codec => json
  }

  file {
    path => "/var/log/crm/*.log"
    start_position => "beginning"
    sincedb_path => "/var/log/crm/.sincedb"
    codec => json
    tags => ["file-input"]
    exclude => ["*.gz"]
  }
}

filter {
  if [serviceName] {
    mutate {
      rename => { "serviceName" => "service" }
    }
  }

  if [requestId] {
    mutate {
      rename => { "requestId" => "request_id" }
    }
  }

  if [correlationId] {
    mutate {
      rename => { "correlationId" => "correlation_id" }
    }
  }

  if [statusCode] {
    mutate {
      convert => { "statusCode" => "integer" }
    }
  }

  if [duration] {
    mutate {
      convert => { "duration" => "integer" }
    }
  }

  if [pid] {
    mutate {
      convert => { "pid" => "integer" }
    }
  }

  useragent {
    source => "userAgent"
    target => "user_agent"
    remove_field => ["userAgent"]
  }

  geoip {
    source => "ip"
    target => "geo"
  }

  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  mutate {
    remove_field => ["@version", "path", "host", "tags"]
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:-elasticsearch:9200}"]
    index => "crm-logs-%{service}-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:-}"
    password => "${ELASTICSEARCH_PASSWORD:-}"
    ssl => false
    ilm_enabled => false
    template_name => "crm-logs-template"
    template_overwrite => false
    retry_on_failed => 3
    flush_size => 500
    idle_flush_time => 5
  }

  stdout {
    codec => rubydebug
    output_type => "json"
  }
}
