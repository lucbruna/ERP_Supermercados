global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:3000"]

  - job_name: "auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:3001"]

  - job_name: "rh-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["rh-service:3002"]

  - job_name: "financial-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["financial-service:3003"]

  - job_name: "pdv-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["pdv-service:3004"]

  - job_name: "inventory-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["inventory-service:3005"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
