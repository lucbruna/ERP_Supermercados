[databases]
* = host=postgres port=5432 dbname=crm_auth
auth_service = host=postgres port=5432 dbname=crm_auth
rh_service = host=postgres port=5432 dbname=crm_rh
financial_service = host=postgres port=5432 dbname=crm_financeiro
pdv_service = host=postgres port=5432 dbname=crm_pdv
inventory_service = host=postgres port=5432 dbname=crm_estoque
crm_service = host=postgres port=5432 dbname=crm_crm
fiscal_service = host=postgres port=5432 dbname=crm_fiscal

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 500
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3.0
server_idle_timeout = 300
query_timeout = 30
max_db_connections = 50
stats_period = 60
